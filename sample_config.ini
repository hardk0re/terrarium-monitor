; --------------------------------------------------------------------------
; sample_config.ini — copy to config.ini and fill in your own values.
; All credentials, API keys, IPs, and coordinates below are PLACEHOLDERS.
; --------------------------------------------------------------------------

[general]
log_retention_days = 31
poll_interval_seconds = 30
timezone = America/New_York
utc_offset_hours = -4
# Minutes a sensor must be unresponsive before raising an "error" event (which
# fires a Pushover notification if notify_error = true). Set to 0 to disable.
sensor_failure_alert_minutes = 10

[feeding]
# Comma-separated list of food items shown as quick-log buttons
food_items = Water, Paste, Cricket

[care]
# Comma-separated list of care items shown as quick-log buttons
care_items = Cleaning, Misting
# Show a reminder (blue CARE screen on display + banner on dashboard) if no
# care OR feeding items have been logged for this many hours. Either counts
# as a check-in. Set to 0 to disable.
care_reminder_hours = 24

[care_button]
# Physical push-button (wired between gpio_pin and GND) that logs the FIRST
# item in [care].care_items when pressed. Long-press not supported.
enabled = false
gpio_pin = 23
# Internal pull-up = true means button shorts to GND when pressed (typical).
pull_up = true
debounce_ms = 300

[gecko]
# Cute gecko mood widget on the dashboard. Color = overall health:
#   green = happy, yellow = warning, red = upset.
# The widget scores each factor and the worst factor wins.
enabled = true
# Unit the temp_* thresholds below are written in. Optional; if blank,
# falls back to [display].temp_unit. Must be F or C.
temp_unit =
# Temperature comfort band (in the unit above). Readings outside the "happy"
# band drop the mood to yellow; outside "critical" drops it to red.
temp_min_happy = 75.0
temp_max_happy = 88.0
temp_min_critical = 65.0
temp_max_critical = 95.0
# Humidity comfort band (%)
humidity_min_happy = 40.0
humidity_max_happy = 70.0
humidity_min_critical = 25.0
humidity_max_critical = 90.0
# Hours since the last care OR feeding log before the gecko gets sad / upset
checkin_warn_hours = 36
checkin_critical_hours = 72
# Optional: limit which sensors influence mood (comma-separated names). Empty = all.
sensors =


[sensor_1]
enabled = true
name = Top
i2c_address = 0x44
i2c_bus = 1

[sensor_2]
enabled = true
name = Middle
i2c_address = 0x45
i2c_bus = 1

[mister]
enabled = false
gpio_pin = 17
relay_active_low = true
humidity_threshold_low = 50.0
humidity_threshold_high = 80.0
mister_runtime_minutes = 10
mister_monitor_delay_minutes = 15
mister_max_runs_per_24h = 6

[fan]
enabled = false
gpio_pin = 27
relay_active_low = true
# Unit the temp_threshold_* values below are written in. Optional; if blank,
# falls back to [display].temp_unit. Must be F or C.
temp_unit =
temp_threshold_high = 30.0
temp_threshold_low = 20.0
fan_runtime_minutes = 10
fan_monitor_delay_minutes = 15
fan_max_runs_per_24h = 12

[lighting]
enabled = true

[tapo_plug_1]
enabled = true
name = UVB Light
ip_address = 192.168.1.101
on_time = 08:00
off_time = 20:00

[tapo_plug_2]
enabled = false
name = Basking Lamp
ip_address = 192.168.1.102
on_time = 08:00
off_time = 18:00

[display]
enabled = true
dc_pin = 24
rst_pin = 25
bl_pin = 18
brightness = 80
# Dimmer brightness during the night window below (0 turns the backlight off).
night_brightness = 15
# Night window in 24h HH:MM. Crossing midnight is fine (e.g. 22:00 → 07:00).
night_start = 22:00
night_end = 07:00
rotation = 0
page_cycle_seconds = 5
temp_unit = F
temp_low = 75.0
temp_high = 85.0
color_temp_cold = 40,120,255
color_temp_good = 20,200,60
color_temp_hot = 220,60,20
color_temp_error = 255,200,0
humidity_display_low = 50.0
humidity_display_high = 80.0
color_hum_low = 40,120,255
color_hum_good = 20,200,60
color_hum_high = 220,60,20
color_hum_error = 255,200,0
color_background = 10,10,20
color_accent = 0,200,120
color_grey = 130,130,150
color_relay_on = 255,200,0
color_relay_off = 60,60,80

[camera]
enabled = true
name = Terrarium Cam
ip_address = 192.168.1.103
onvif_port = 2020
username = REPLACE_ME
password = REPLACE_ME
stream_profile = sub
snapshot_interval_seconds = 30
snapshot_path = data/snapshot.jpg
timelapse_enabled = true
timelapse_path = data/timelapse/
timelapse_interval_seconds = 300
timelapse_retention_days = 7


[weather]
enabled = true
# Get a free key at https://openweathermap.org/api
api_key = REPLACE_ME
# Decimal degrees. Look these up for your location.
latitude = 0.0
longitude = 0.0
# How often to fetch weather in seconds (free tier limit: 60 calls/min)
poll_interval_seconds = 600
# Temperature unit for display: C or F (uses display temp_unit if not set)
temp_unit = C

[pushover]
# Pushover credentials — get yours at https://pushover.net
enabled = false
api_token = REPLACE_ME
user_key = REPLACE_ME
# Optional: send only to a specific device (leave blank for all your devices)
device =
# Default notification sound — see https://pushover.net/api#sounds
sound = pushover
# Per-category notification toggles. Set to false to silence that category.
notify_startup  = true
notify_shutdown = true
notify_error    = true
notify_config   = false
notify_relay    = false
notify_light    = false
notify_camera   = false
notify_feeding  = false
notify_care     = true
# Notify when the gecko's mood transitions (happy/neutral/upset).
notify_gecko_mood_change = true

[web]
site_title = Terrarium Monitor
enabled = true
host = 0.0.0.0
port = 8080
config_protected = true
# Set to true to require login. Change the password below first!
auth_enabled = false
username = admin
password = CHANGE_ME

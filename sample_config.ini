; --------------------------------------------------------------------------
; sample_config.ini — copy to config.ini and fill in your own values.
; All credentials, API keys, IPs, and coordinates below are PLACEHOLDERS.
; --------------------------------------------------------------------------

[general]
log_retention_days = 31
poll_interval_seconds = 30
timezone = America/New_York
utc_offset_hours = -4
# Minutes a sensor must be unresponsive before raising an "error" event (which
# fires a Pushover notification if notify_error = true). Set to 0 to disable.
sensor_failure_alert_minutes = 10
# Log verbosity. INFO is the default and writes the events you'd see on
# `python main.py`. DEBUG adds per-poll sensor reads, every relay decision,
# every config lookup — useful for troubleshooting, but the log file grows
# ~5-10x faster. Flip to DEBUG, capture the issue, then flip back.
# Valid: DEBUG | INFO | WARNING | ERROR
log_level = INFO
# Home Assistant integration (used by [mister] and any future HA-backed
# automation). Create the token at HA → Profile → Long-Lived Access Tokens.
# Trailing /api is optional — either form works.
ha_base_url = http://homeassistant.local:8123
ha_token =

[feeding]
# Comma-separated list of food items shown as quick-log buttons
food_items = Water, Paste, Cricket

[care]
# Comma-separated list of care items shown as quick-log buttons
care_items = Cleaning, Misting
# Show a reminder (blue CARE screen on display + banner on dashboard) if no
# care OR feeding items have been logged for this many hours. Either counts
# as a check-in. Set to 0 to disable.
care_reminder_hours = 24
# Care item names that should ALSO fire the mister when logged from the
# dashboard. Case-insensitive, comma-separated. Subject to all the usual
# mister safety limits (cooldown, 24h cap, button_enabled). Empty = never
# auto-mist from a care log.
mister_trigger_items = Misting

; --------------------------------------------------------------------------
; Physical push-buttons (up to 3). Each button is wired between gpio_pin and
; GND. When pressed, it logs `message` under `category` so it appears in the
; event log AND fires a Pushover notification (if notify_<category> = true).
;
; Common category values: care, feeding, error, gecko
; (any string works — Pushover delivery is gated by [pushover].notify_<cat>)
;
; If you only use one button, you can also leave it under the legacy
; section name [care_button] — it's wired in as button 1 automatically.
; --------------------------------------------------------------------------

[care_button_1]
enabled = false
# GPIO 13 (header pin 33). Other leg of the button → GND on header pin 39.
gpio_pin = 13
pull_up = true
debounce_ms = 300
category = care
message = Cleaning

[care_button_2]
enabled = false
# GPIO 19 (header pin 35). Other leg of the button → GND on header pin 39.
gpio_pin = 19
pull_up = true
debounce_ms = 300
category = feeding
message = Cricket

[care_button_3]
enabled = false
# GPIO 26 (header pin 37). Other leg of the button → GND on header pin 39.
gpio_pin = 26
pull_up = true
debounce_ms = 300
category = care
message = Misting

[gecko]
# Cute gecko mood widget on the dashboard. Color = overall health:
#   green = happy, yellow = warning, red = upset.
# The widget scores each factor and the worst factor wins.
enabled = true
# Unit the temp_* thresholds below are written in. Optional; if blank,
# falls back to [display].temp_unit. Must be F or C.
temp_unit =
# Temperature comfort band (in the unit above). Readings outside the "happy"
# band drop the mood to yellow; outside "critical" drops it to red.
temp_min_happy = 75.0
temp_max_happy = 88.0
temp_min_critical = 65.0
temp_max_critical = 95.0
# Humidity comfort band (%)
humidity_min_happy = 40.0
humidity_max_happy = 70.0
humidity_min_critical = 25.0
humidity_max_critical = 90.0
# Hours since the last care OR feeding log before the gecko gets sad / upset
checkin_warn_hours = 36
checkin_critical_hours = 72
# Optional: limit which sensors influence mood (comma-separated names). Empty = all.
sensors =


[sensor_1]
enabled = true
name = Top
i2c_address = 0x44
i2c_bus = 1
# Optional calibration offsets added to each raw reading. Use these when
# multiple SHT31 chips disagree in the same spot, or to align with a known-
# good reference thermometer. Both default to 0.0 (no correction).
# Example: sensor reads 22.0°C, reference says 22.5°C → temp_offset_c = 0.5
temp_offset_c = 0.0
humidity_offset = 0.0

[sensor_2]
enabled = true
name = Middle
i2c_address = 0x45
i2c_bus = 1
temp_offset_c = 0.0
humidity_offset = 0.0

[mister]
# Auto-run controls humidity-based triggering. Button-only setups can leave
# enabled = false and button_enabled = true.
enabled = false
# Allows the web dashboard's Force-ON button (and any future display button)
# to fire a misting cycle on demand. Off button is always allowed.
button_enabled = true
# Home Assistant entity to turn on/off — typically a switch.* that drives
# whatever device runs your mister.
ha_entity_id = switch.terrarium_mister
# Which sensor's humidity drives auto-trigger. Blank = average of ALL enabled
# sensors. Otherwise, set to a sensor NAME (the `name = ...` value in the
# [sensor_N] section, e.g. "Hot Zone") to use ONLY that sensor exclusively.
sensor =
humidity_threshold_low = 50.0
humidity_threshold_high = 80.0
# All durations in SECONDS (misting cycles are short — minutes was awkward).
mister_runtime_seconds = 600
mister_monitor_delay_seconds = 900
mister_max_runs_per_24h = 6

[fan]
enabled = false
gpio_pin = 27
relay_active_low = true
# Which sensor drives BOTH the temp and humidity checks below. Blank =
# average of ALL enabled sensors. Otherwise, set to a sensor NAME (the
# `name = ...` value in the [sensor_N] section, e.g. "Hot Zone") to use
# ONLY that sensor exclusively.
sensor =
# Unit the temp_threshold_* values below are written in. Optional; if blank,
# falls back to [display].temp_unit. Must be F or C.
temp_unit =
# Three independent trigger conditions — fan turns on if ANY of these is true:
#   avg temp  > temp_threshold_high   (too hot)
#   avg temp  < temp_threshold_low    (too cold)
#   avg humidity > humidity_threshold_high   (too humid)
temp_threshold_high = 30.0
temp_threshold_low = 20.0
# Humidity ceiling — fan/plug turns on when avg humidity goes above this,
# and off when it drops back below. Also used by Tapo fan-mode plugs.
humidity_threshold_high = 80.0
# Runtime in minutes per kick. Special value: set to 0 for CONTINUOUS mode —
# the fan runs as long as any trigger condition is met, and turns off the
# instant they all clear. In continuous mode there is no cooldown and no
# 24h run cap (those settings are ignored).
fan_runtime_minutes = 10
fan_monitor_delay_minutes = 15
fan_max_runs_per_24h = 12

[tapo_plug_1]
enabled = true
name = UVB Light
ip_address = 192.168.1.101
# mode = light → scheduled on/off (default). mode = fan → only powers the
# plug within the window AND only when avg temp > [fan].temp_threshold_high
# OR avg humidity > [fan].humidity_threshold_high.
mode = light
on_time = 08:00
off_time = 20:00

[tapo_plug_2]
enabled = false
name = Exhaust Fan
ip_address = 10.1.10.70
mode = fan
# Allowed window — outside this window the plug is forced off even if hot/humid.
on_time = 08:00
off_time = 22:00

[display]
enabled = true
dc_pin = 24
rst_pin = 25
bl_pin = 18
brightness = 80
# Dimmer brightness during the night window below (0 turns the backlight off).
night_brightness = 15
# Night window in 24h HH:MM. Crossing midnight is fine (e.g. 22:00 → 07:00).
night_start = 22:00
night_end = 07:00
rotation = 0
page_cycle_seconds = 5
temp_unit = F
temp_low = 75.0
temp_high = 85.0
color_temp_cold = 40,120,255
color_temp_good = 20,200,60
color_temp_hot = 220,60,20
color_temp_error = 255,200,0
humidity_display_low = 50.0
humidity_display_high = 80.0
color_hum_low = 40,120,255
color_hum_good = 20,200,60
color_hum_high = 220,60,20
color_hum_error = 255,200,0
color_background = 10,10,20
color_accent = 0,200,120
color_grey = 130,130,150
color_relay_on = 255,200,0
color_relay_off = 60,60,80

[camera]
enabled = true
name = Terrarium Cam
ip_address = 192.168.1.103
onvif_port = 2020
username = REPLACE_ME
password = REPLACE_ME
stream_profile = sub
snapshot_interval_seconds = 30
snapshot_path = data/snapshot.jpg
timelapse_enabled = true
timelapse_path = data/timelapse/
timelapse_interval_seconds = 300
timelapse_retention_days = 7


[weather]
enabled = true
# Get a free key at https://openweathermap.org/api
api_key = REPLACE_ME
# Decimal degrees. Look these up for your location.
latitude = 0.0
longitude = 0.0
# How often to fetch weather in seconds (free tier limit: 60 calls/min)
poll_interval_seconds = 600
# Temperature unit for display: C or F (uses display temp_unit if not set)
temp_unit = C

[pushover]
# Pushover credentials — get yours at https://pushover.net
enabled = false
api_token = REPLACE_ME
user_key = REPLACE_ME
# Optional: send only to a specific device (leave blank for all your devices)
device =
# Default notification sound — see https://pushover.net/api#sounds
sound = pushover
# Per-category notification toggles. Set to false to silence that category.
notify_startup  = true
notify_shutdown = true
notify_error    = true
notify_config   = false
notify_relay    = false
notify_light    = false
notify_camera   = false
notify_feeding  = false
notify_care     = true
# Notify when the gecko's mood transitions (happy/neutral/upset).
notify_gecko_mood_change = true

[web]
site_title = Terrarium Monitor
pet_name = Gecko
enabled = true
host = 0.0.0.0
port = 8080
config_protected = true
# Set to true to require login. Change the password below first!
auth_enabled = false
username = admin
password = CHANGE_ME
# When true and 2+ sensors are reporting, insert an "Average" card into the
# live sensors row showing the mean of every sensor's temp + humidity.
show_average_card = false
